<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Topics Database</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        notion: {
                            bg: '#ffffff',
                            text: '#37352f',
                            textgray: '#787774',
                            border: '#e9e9e7',
                            hover: '#f1f1ef',
                            accent: '#2383e2'
                        }
                    },
                    boxShadow: {
                        'search': '0 2px 6px rgba(0, 0, 0, 0.08)',
                        'search-focus': '0 4px 12px rgba(0, 0, 0, 0.12)',
                        'dropdown': 'rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.1) 0px 3px 6px, rgba(15, 15, 15, 0.2) 0px 9px 24px',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #ffffff;
            color: #37352f;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Subtle custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d3d1cb;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #aeaca6;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Smooth Accordion Transitions */
        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-out;
            opacity: 0;
        }
        .accordion-content.open {
            grid-template-rows: 1fr;
            opacity: 1;
        }
        .accordion-inner {
            overflow: hidden;
        }
        
        .chevron-icon {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .chevron-icon.open {
            transform: rotate(180deg);
        }
        
        /* Hero to Header Transition */
        .header-transition {
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans bg-notion-bg text-notion-text dark:bg-[#191919] dark:text-[#EAEAEA] overflow-x-hidden scroll-smooth relative transition-colors duration-300">

    <!-- Navigation & Theme Toggle Bar -->
    <div class="fixed top-0 left-0 right-0 w-full flex justify-between items-center p-4 z-50 pointer-events-none">
        <!-- Hamburger Menu -->
        <div class="relative pointer-events-auto">
            <button id="menuBtn" class="p-2 rounded-xl bg-white/80 dark:bg-[#252525]/80 backdrop-blur-md border border-gray-200 dark:border-[#333] shadow-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-[#333] transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <!-- Dropdown -->
            <div id="menuDropdown" class="hidden absolute top-full left-0 mt-2 w-48 bg-white dark:bg-[#252525] border border-gray-200 dark:border-[#333] rounded-xl shadow-lg py-2 transition-all origin-top-left overflow-hidden">
                <a href="index.html" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-[#333] transition-colors">Home</a>
                <a href="thesis.html" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-[#333] transition-colors">Thesis</a>
            </div>
        </div>

        <!-- Theme Toggle -->
        <div class="pointer-events-auto">
            <button id="themeToggleBtn" class="p-2 rounded-xl bg-white/80 dark:bg-[#252525]/80 backdrop-blur-md border border-gray-200 dark:border-[#333] shadow-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-[#333] transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                <svg class="w-6 h-6 hidden dark:block text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg class="w-6 h-6 block dark:hidden text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>
    </div>

    <header id="mainHeader" class="header-transition w-full max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 min-h-[100vh] flex flex-col justify-center items-center relative z-30">
        
        <div class="flex flex-col w-full items-center gap-6 transition-all duration-500">
            <!-- Title -->
            <div class="flex items-center gap-3 w-full justify-center" id="headerTitle">
                <svg class="w-10 h-10 text-notion-text dark:text-white opacity-80 transition-all duration-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
                </svg>
                <h1 class="text-4xl sm:text-5xl font-bold tracking-tight text-notion-text dark:text-white transition-all duration-500">Thesis Topics</h1>
            </div>
            
            <!-- Google-inspired Pill Search Bar -->
            <div class="w-full max-w-3xl flex items-center bg-white dark:bg-[#252525] border border-gray-200 dark:border-[#444] rounded-[32px] shadow-search hover:shadow-search-focus focus-within:shadow-search-focus transition-all duration-300 px-2 py-1.5 sm:py-2 relative group">
                
                <!-- Search Icon -->
                <div class="pl-4 pr-2 text-gray-400 dark:text-gray-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>

                <!-- Search Input -->
                <input 
                    type="text" 
                    id="searchInput" 
                    class="flex-grow bg-transparent outline-none text-gray-800 dark:text-gray-200 placeholder-gray-500 dark:placeholder-gray-400 text-base sm:text-lg w-full py-2" 
                    placeholder="Search topics (e.g., 'AI AND Vehicle', 'Energy OR Solar')..."
                    autocomplete="off"
                >
                
                <!-- Filter Button -->
                <div class="flex items-center flex-shrink-0 relative mr-1">
                    <button 
                        id="filterBtn"
                        type="button" 
                        class="px-4 py-2 bg-[#f0f4f9] dark:bg-[#333] hover:bg-[#e8ebf0] dark:hover:bg-[#444] text-[#041e49] dark:text-blue-300 text-sm font-medium rounded-full flex items-center gap-2 transition-colors"
                    >
                        <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 3a1 1 0 011-1h12a1 1 0 011 1v3a1 1 0 01-.293.707L12 11.414V15a1 1 0 01-.293.707l-2 2A1 1 0 018 17v-5.586L3.293 6.707A1 1 0 013 6V3z" clip-rule="evenodd" />
                        </svg>
                        <span>Filter</span>
                    </button>
                    
                    <!-- Filter Dropdown Panel -->
                    <div id="filterDropdown" class="hidden origin-top-right absolute right-0 top-full mt-3 w-72 rounded-2xl shadow-dropdown bg-white dark:bg-[#252525] ring-1 ring-black/5 dark:ring-white/10 focus:outline-none z-40 transition-all p-4 cursor-default">
                        
                        <div class="mb-4 relative">
                            <label class="block text-xs font-semibold text-notion-textgray dark:text-gray-400 uppercase tracking-wider mb-2">Teacher Name</label>
                            
                            <!-- Custom Multi-Select Dropdown for Teachers -->
                            <div class="relative" id="teacherMultiSelectContainer">
                                <div id="teacherSelectTrigger" class="w-full bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-[#444] text-gray-800 dark:text-gray-200 rounded-lg pl-3 pr-8 py-2 text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all cursor-pointer flex justify-between items-center">
                                    <span id="teacherSelectLabel" class="truncate pointer-events-none">All Teachers</span>
                                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500 dark:text-gray-400">
                                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </div>
                                </div>

                                <!-- Inline Checkbox Panel -->
                                <div id="teacherOptionsPanel" class="hidden flex-col mt-2 border border-gray-200 dark:border-[#444] shadow-sm rounded-lg overflow-hidden transition-all">
                                    <div id="teacherCheckboxes" class="max-h-40 overflow-y-auto p-2 flex flex-col gap-1 bg-white dark:bg-[#252525]">
                                        <!-- Checkboxes injected by JS -->
                                    </div>
                                    <div class="p-2 border-t border-gray-100 dark:border-[#333] bg-gray-50 dark:bg-[#1a1a1a]">
                                        <button id="teacherDoneBtn" class="w-full py-1.5 text-sm bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md transition-colors">
                                            Done
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4 relative">
                            <label class="block text-xs font-semibold text-notion-textgray dark:text-gray-400 uppercase tracking-wider mb-2">Keywords</label>
                            
                            <!-- Custom Multi-Select Dropdown -->
                            <div class="relative" id="keywordMultiSelectContainer">
                                <div id="keywordSelectTrigger" class="w-full bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-[#444] text-gray-800 dark:text-gray-200 rounded-lg pl-3 pr-8 py-2 text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all cursor-pointer flex justify-between items-center">
                                    <span id="keywordSelectLabel" class="truncate pointer-events-none">All Keywords</span>
                                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500 dark:text-gray-400">
                                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </div>
                                </div>

                                <!-- Inline Checkbox Panel -->
                                <div id="keywordOptionsPanel" class="hidden flex-col mt-2 border border-gray-200 dark:border-[#444] shadow-sm rounded-lg overflow-hidden transition-all">
                                    <div id="keywordCheckboxes" class="max-h-40 overflow-y-auto p-2 flex flex-col gap-1 bg-white dark:bg-[#252525]">
                                        <!-- Checkboxes injected by JS -->
                                    </div>
                                    <div class="p-2 border-t border-gray-100 dark:border-[#333] bg-gray-50 dark:bg-[#1a1a1a]">
                                        <button id="keywordDoneBtn" class="w-full py-1.5 text-sm bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md transition-colors">
                                            Done
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="pt-2 border-t border-gray-100 dark:border-[#333]">
                            <button id="resetFiltersBtn" class="w-full text-center px-3 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 font-medium rounded-xl transition-colors">
                                Reset Filters
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Stats row -->
            <div class="flex items-center justify-center w-full max-w-3xl mt-2 transition-opacity duration-300 opacity-0" id="filterRow">
                <span id="resultsCount" class="text-sm text-notion-textgray dark:text-gray-400 font-medium">0 topics found</span>
            </div>
        </div>

        <!-- Scroll Indicator -->
        <div id="scrollIndicator" class="absolute bottom-12 inset-x-0 mx-auto w-fit flex flex-col items-center gap-2 text-notion-textgray dark:text-gray-500 opacity-80 animate-bounce pointer-events-none transition-opacity duration-500">
            <span class="text-sm font-medium tracking-wide select-none">Scroll to view all</span>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
        </div>
    </header>

    <main id="mainContent" class="opacity-0 translate-y-12 pointer-events-none transition-all duration-700 ease-out flex-grow w-full max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 pb-16">
        <div id="topicsContainer" class="flex flex-col gap-3">
            <!-- Accordion cards will be injected here via JS -->
        </div>
        
        <!-- Empty State -->
        <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-center">
            <div class="bg-notion-hover dark:bg-[#333] p-4 rounded-full mb-4">
                <svg class="h-8 w-8 text-notion-textgray dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <h3 class="text-lg font-medium text-notion-text dark:text-white mb-1">No topics found</h3>
            <p class="text-notion-textgray dark:text-gray-400 max-w-md">Try adjusting your search terms or filters.</p>
        </div>
    </main>

    <script>
        let thesisData = [];

        const container = document.getElementById('topicsContainer');
        const searchInput = document.getElementById('searchInput');
        
        // Teacher Multi-Select Elements
        const teacherSelectTrigger = document.getElementById('teacherSelectTrigger');
        const teacherOptionsPanel = document.getElementById('teacherOptionsPanel');
        const teacherCheckboxesContainer = document.getElementById('teacherCheckboxes');
        const teacherSelectLabel = document.getElementById('teacherSelectLabel');
        const teacherDoneBtn = document.getElementById('teacherDoneBtn');
        let selectedTeachers = [];
        
        // Keyword Multi-Select Elements
        const keywordSelectTrigger = document.getElementById('keywordSelectTrigger');
        const keywordOptionsPanel = document.getElementById('keywordOptionsPanel');
        const keywordCheckboxesContainer = document.getElementById('keywordCheckboxes');
        const keywordSelectLabel = document.getElementById('keywordSelectLabel');
        const keywordDoneBtn = document.getElementById('keywordDoneBtn');
        let selectedKeywords = [];

        const resetFiltersBtn = document.getElementById('resetFiltersBtn');
        const emptyState = document.getElementById('emptyState');
        const resultsCount = document.getElementById('resultsCount');
        const filterBtn = document.getElementById('filterBtn');
        const filterDropdown = document.getElementById('filterDropdown');
        const filterRow = document.getElementById('filterRow');

        // General search logic parsing AND, OR, NOT for Main Search Bar
        function evaluateMainSearch(item, query) {
            if (!query.trim()) return true;
            
            // Search within title and description
            const searchableText = `${item.title} ${item.description}`.toLowerCase();
            const orClauses = query.split(/\s+OR\s+/i);

            return orClauses.some(orClause => {
                const rawTokens = orClause.trim().split(/\s+AND\s+|\s+/i);
                let isValid = true;
                
                for (let i = 0; i < rawTokens.length; i++) {
                    let token = rawTokens[i].trim();
                    if (!token) continue;

                    let isNot = false;
                    
                    if (token.toUpperCase() === 'NOT') {
                        isNot = true;
                        i++; 
                        if (i < rawTokens.length) {
                            token = rawTokens[i].trim();
                        } else {
                            continue;
                        }
                    } else if (token.startsWith('-')) {
                        isNot = true;
                        token = token.substring(1).trim();
                    }

                    if (token) {
                        const found = searchableText.includes(token.toLowerCase());
                        if (isNot && found) {
                            isValid = false; 
                            break;
                        }
                        if (!isNot && !found) {
                            isValid = false; 
                            break;
                        }
                    }
                }
                return isValid;
            });
        }

        // Populate Dropdowns dynamically based on available data
        function populateFilterOptions(data) {
            const teachers = new Set();
            const keywords = new Set();

            data.forEach(item => {
                // Collect unique teachers (splitting by comma if multiple)
                if (item.teacher) {
                    item.teacher.split(',').forEach(t => {
                        const trimmed = t.trim();
                        if (trimmed) teachers.add(trimmed);
                    });
                }
                // Collect unique keywords (splitting by comma or semicolon)
                if (item.keywords) {
                    item.keywords.split(/[,;]/).forEach(k => {
                        const trimmed = k.trim();
                        if (trimmed) keywords.add(trimmed);
                    });
                }
            });

            // Sort alphabetically
            const sortedTeachers = Array.from(teachers).sort((a, b) => a.localeCompare(b));
            const sortedKeywords = Array.from(keywords).sort((a, b) => a.localeCompare(b));

            // Generate Teacher Checkboxes
            teacherCheckboxesContainer.innerHTML = '';
            sortedTeachers.forEach(t => {
                const label = document.createElement('label');
                label.className = "flex items-start gap-2.5 p-1.5 hover:bg-gray-100 dark:hover:bg-[#333] rounded cursor-pointer text-sm text-gray-800 dark:text-gray-200 transition-colors";
                
                const checkbox = document.createElement('input');
                checkbox.type = "checkbox";
                checkbox.value = t;
                checkbox.className = "mt-0.5 rounded border-gray-300 text-blue-600 focus:ring-blue-500 w-4 h-4 accent-blue-600 bg-white dark:bg-[#1a1a1a]";
                
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedTeachers.push(t);
                    } else {
                        selectedTeachers = selectedTeachers.filter(item => item !== t);
                    }
                    updateTeacherLabel();
                    applyFilters(); 
                });

                const span = document.createElement('span');
                span.textContent = t;
                span.className = "leading-tight";
                
                label.appendChild(checkbox);
                label.appendChild(span);
                teacherCheckboxesContainer.appendChild(label);
            });

            // Generate Keyword Checkboxes
            keywordCheckboxesContainer.innerHTML = '';
            sortedKeywords.forEach(k => {
                const label = document.createElement('label');
                label.className = "flex items-start gap-2.5 p-1.5 hover:bg-gray-100 dark:hover:bg-[#333] rounded cursor-pointer text-sm text-gray-800 dark:text-gray-200 transition-colors";
                
                const checkbox = document.createElement('input');
                checkbox.type = "checkbox";
                checkbox.value = k;
                checkbox.className = "mt-0.5 rounded border-gray-300 text-blue-600 focus:ring-blue-500 w-4 h-4 accent-blue-600 bg-white dark:bg-[#1a1a1a]";
                
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedKeywords.push(k);
                    } else {
                        selectedKeywords = selectedKeywords.filter(item => item !== k);
                    }
                    updateKeywordLabel();
                    applyFilters(); 
                });

                const span = document.createElement('span');
                span.textContent = k;
                span.className = "leading-tight";
                
                label.appendChild(checkbox);
                label.appendChild(span);
                keywordCheckboxesContainer.appendChild(label);
            });
        }

        function updateTeacherLabel() {
            if (selectedTeachers.length === 0) {
                teacherSelectLabel.textContent = "All Teachers";
            } else if (selectedTeachers.length === 1) {
                teacherSelectLabel.textContent = selectedTeachers[0];
            } else {
                teacherSelectLabel.textContent = `${selectedTeachers.length} Selected`;
            }
        }

        function updateKeywordLabel() {
            if (selectedKeywords.length === 0) {
                keywordSelectLabel.textContent = "All Keywords";
            } else if (selectedKeywords.length === 1) {
                keywordSelectLabel.textContent = selectedKeywords[0];
            } else {
                keywordSelectLabel.textContent = `${selectedKeywords.length} Selected`;
            }
        }

        // Sub-filters logic
        function evaluateSpecificFilters(item) {
            let matchesTeacher = true;
            let matchesKeyword = true;

            if (selectedTeachers.length > 0) {
                // If teachers are selected, item must have AT LEAST ONE of the selected teachers (OR Logic)
                const itemTeachers = (item.teacher || '').split(',').map(t => t.trim().toLowerCase());
                matchesTeacher = selectedTeachers.some(sel => itemTeachers.includes(sel.toLowerCase()));
            }

            if (selectedKeywords.length > 0) {
                // If keywords are selected, item must have AT LEAST ONE of the selected keywords (OR Logic)
                const itemKeywords = (item.keywords || '').split(/[,;]/).map(k => k.trim().toLowerCase());
                matchesKeyword = selectedKeywords.some(sel => itemKeywords.includes(sel.toLowerCase()));
            }

            return matchesTeacher && matchesKeyword;
        }

        // Central Filtering Function combining all inputs
        function applyFilters() {
            const mainQuery = searchInput.value;

            // Optional: Auto reveal on typing/selecting
            if (mainQuery || selectedTeachers.length > 0 || selectedKeywords.length > 0) {
                revealContent();
            }

            const filteredData = thesisData.filter(item => {
                return evaluateMainSearch(item, mainQuery) && evaluateSpecificFilters(item);
            });

            renderCards(filteredData);
        }

        // Accordion Toggle
        window.toggleAccordion = function(button) {
            const card = button.closest('.accordion-card');
            const content = card.querySelector('.accordion-content');
            const icon = button.querySelector('.chevron-icon');
            
            content.classList.toggle('open');
            icon.classList.toggle('open');
        };

        function renderCards(dataToRender) {
            container.innerHTML = '';
            
            if (dataToRender.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                container.classList.remove('hidden');
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                
                dataToRender.forEach((item) => {
                    const card = document.createElement('article');
                    card.className = `accordion-card bg-white dark:bg-[#252525] border border-notion-border dark:border-[#333] rounded-2xl transition-all duration-200 hover:border-gray-300 dark:hover:border-[#555] hover:shadow-sm`;

                    // Parse keywords nicely
                    let keywordsHtml = '';
                    if (item.keywords) {
                        // Split by comma or semicolon
                        const keywordArray = item.keywords.split(/[,;]/).map(k => k.trim()).filter(k => k);
                        keywordsHtml = keywordArray.map(k => `
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-medium bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 border border-blue-100 dark:border-blue-800/50">
                                ${k}
                            </span>
                        `).join('');
                    } else {
                        keywordsHtml = `<span class="text-xs text-gray-400 dark:text-gray-500 italic">No keywords available</span>`;
                    }

                    const teacherName = item.teacher ? item.teacher : 'Not Assigned';

                    // Generate card HTML with new fields
                    card.innerHTML = `
                        <button class="w-full flex items-start sm:items-center justify-between p-4 sm:p-5 text-left focus:outline-none focus-visible:ring-2 focus-visible:ring-gray-200 dark:focus-visible:ring-gray-700 rounded-2xl group" onclick="toggleAccordion(this)">
                            <div class="flex items-start sm:items-center gap-3 sm:gap-4 pr-4">
