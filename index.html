<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Class Routine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        // Set dark mode instantly on load to prevent screen flash
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        
        /* Modal transitions */
        .modal-overlay { transition: opacity 0.3s ease-out; }
        .modal-content { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-out; }
    </style>
</head>
<body class="bg-[#f8fafc] dark:bg-[#0f172a] text-slate-900 dark:text-slate-100 antialiased min-h-screen pb-12 selection:bg-blue-500 selection:text-white transition-colors duration-300">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6 pb-12">
        
        <!-- Navigation & Controls Bar -->
        <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 animate-fade-in relative z-40">
            
            <!-- User Selector Dropdown -->
            <div class="relative w-full sm:w-auto">
                <select id="user-selector" class="appearance-none w-full sm:w-auto bg-white dark:bg-slate-800/80 backdrop-blur-md border border-slate-200 dark:border-slate-700/50 text-slate-800 dark:text-slate-200 text-sm sm:text-base font-semibold rounded-2xl pl-5 pr-12 py-3.5 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 cursor-pointer transition-all hover:border-slate-300 dark:hover:border-slate-600">
                    <option value="" disabled selected>Loading Users...</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                    <i class="ph ph-caret-down font-bold"></i>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto">
                <!-- Free Schedule Button -->
                <button id="free-schedule-btn" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-3.5 rounded-2xl bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-500/20 hover:bg-indigo-100 dark:hover:bg-indigo-500/30 font-semibold text-sm transition-all shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50">
                    <i class="ph ph-users-three text-lg"></i>
                    <span>Free Time</span>
                </button>

                <!-- Theme Toggle Button -->
                <button id="theme-btn" class="p-3.5 rounded-2xl bg-white dark:bg-slate-800/80 backdrop-blur-md border border-slate-200 dark:border-slate-700/50 shadow-sm text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                    <i id="theme-icon" class="ph ph-moon text-xl hidden dark:block text-yellow-400"></i>
                    <i id="theme-icon-light" class="ph ph-sun text-xl block dark:hidden text-indigo-500"></i>
                </button>
            </div>
        </div>

        <!-- Main Responsive Layout Wrapper (Split view on Desktop) -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 items-start">
            
            <!-- Left Panel: Clock & Date Selection (Sticky on Desktop) -->
            <div class="lg:col-span-4 lg:sticky lg:top-8 animate-fade-in z-30">
                <header class="text-center bg-white/70 dark:bg-slate-800/40 backdrop-blur-xl rounded-[2rem] p-8 shadow-sm border border-slate-200/60 dark:border-slate-700/50 relative overflow-hidden">
                    
                    <!-- Decorative background glow -->
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-blue-500/10 dark:bg-blue-500/20 rounded-full blur-3xl -z-10"></div>

                    <h1 id="time-display" class="text-7xl font-extrabold tracking-tighter text-slate-900 dark:text-white drop-shadow-sm transition-all duration-200">
                        00:00
                    </h1>
                    
                    <!-- Date & Date Picker Section -->
                    <div class="mt-8 flex flex-col items-center justify-center space-y-4">
                        <div id="date-selector" class="flex items-center justify-center space-x-2 text-slate-600 dark:text-slate-300 relative group cursor-pointer bg-slate-100/80 dark:bg-slate-900/50 hover:bg-slate-200/80 dark:hover:bg-slate-800/80 px-6 py-3.5 rounded-2xl transition-all border border-slate-200/50 dark:border-slate-700/50 shadow-sm active:scale-95">
                            <i class="ph ph-calendar-blank text-xl"></i>
                            <p id="date-display" class="text-sm font-semibold tracking-wide"></p>
                            <i class="ph ph-caret-down text-xs text-slate-400 ml-1"></i>
                            <!-- Hidden native date picker -->
                            <input type="date" id="date-picker" class="absolute w-0 h-0 opacity-0 overflow-hidden" style="bottom: 0; left: 50%;">
                        </div>
                        
                        <button id="reset-btn" class="hidden text-xs bg-blue-50 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-500/20 border border-blue-200 dark:border-blue-500/30 px-5 py-2.5 rounded-full transition-all items-center space-x-1.5 shadow-sm active:scale-95 font-medium">
                            <i class="ph ph-arrow-u-down-left font-bold"></i>
                            <span>Back to Today</span>
                        </button>
                    </div>
                </header>
            </div>

            <!-- Right Panel: Dynamic Schedule Container -->
            <main id="routine-container" class="lg:col-span-8 space-y-10 relative z-20 min-h-[50vh]">
                <!-- Dynamic content will be injected here by JS -->
                <div class="flex justify-center items-center h-full pt-20 text-slate-400">
                    <i class="ph ph-spinner animate-spin text-3xl"></i>
                </div>
            </main>

        </div>
    </div>

    <!-- Free Schedule Modal Overlay -->
    <div id="free-modal-overlay" class="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-md z-50 hidden flex items-center justify-center p-4 modal-overlay opacity-0">
        <!-- Modal Content -->
        <div id="free-modal-content" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700/60 rounded-[2rem] shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col transform scale-95 opacity-0 modal-content overflow-hidden">
            
            <div class="flex justify-between items-center p-6 sm:p-8 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50">
                <div class="flex items-center gap-4">
                    <div class="bg-indigo-100 dark:bg-indigo-500/20 p-2.5 rounded-2xl text-indigo-600 dark:text-indigo-400">
                        <i class="ph ph-users-three text-2xl"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100">Common Free Times</h2>
                        <p class="text-xs font-medium text-slate-500 mt-0.5">When everyone is available (08:00 - 18:00)</p>
                    </div>
                </div>
                <button id="close-modal-btn" class="text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:outline-none bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-700">
                    <i class="ph ph-x text-xl font-bold"></i>
                </button>
            </div>
            
            <div class="p-6 sm:p-8 overflow-y-auto">
                <div id="free-schedule-table-container">
                    <!-- Table injected by JS -->
                </div>
            </div>
            
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CLASS_DURATION_MINUTES = 50; 
        const LAB_DURATION_MINUTES = 150; 

        let globalData = null; 
        let currentUser = null; 

        const daysOfWeek = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
        const workingDays = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday'];
        
        let manualDate = null;

        // --- HELPER FUNCTIONS ---
        function timeStringToMinutes(timeStr) {
            const hours = parseInt(timeStr.substring(0, 2), 10);
            const mins = parseInt(timeStr.substring(2, 4), 10);
            return (hours * 60) + mins;
        }
        
        function minutesToTimeStr(minsTotal) {
            const h = Math.floor(minsTotal / 60);
            const m = minsTotal % 60;
            return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
        }

        function formatTimeStr(timeStr) {
            let hours = timeStr.substring(0, 2);
            let mins = timeStr.substring(2, 4);
            return `${hours}:${mins}`;
        }

        function getMinutesFromMidnight(date) {
            return (date.getHours() * 60) + date.getMinutes();
        }

        // --- MAIN APP LOGIC ---
        function updateApp() {
            const realNow = new Date();
            const targetDate = manualDate || realNow;
            
            // 1. Update Clock Display (Real time)
            let hours = realNow.getHours();
            let minutes = realNow.getMinutes();
            document.getElementById('time-display').innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;

            // 2. Update Date Display
            const options = { weekday: 'long', month: 'short', day: 'numeric' };
            document.getElementById('date-display').innerText = targetDate.toLocaleDateString('en-US', options);

            const resetBtn = document.getElementById('reset-btn');
            const datePicker = document.getElementById('date-picker');
            
            if (manualDate) {
                resetBtn.classList.remove('hidden');
                resetBtn.classList.add('flex');
            } else {
                resetBtn.classList.add('hidden');
                resetBtn.classList.remove('flex');
                datePicker.value = ''; 
            }

            if (!globalData || !currentUser) return; 
            
            const routineData = globalData[currentUser];
            if(!routineData) return;

            // 3. Process Routine Data
            const currentDayName = daysOfWeek[targetDate.getDay()];
            const todaysClassesRaw = routineData[currentDayName] || {};
            const currentMinutes = getMinutesFromMidnight(realNow);

            const todayMidnight = new Date(realNow.getFullYear(), realNow.getMonth(), realNow.getDate());
            const targetMidnight = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
            
            const isToday = targetMidnight.getTime() === todayMidnight.getTime();
            const isPast = targetMidnight.getTime() < todayMidnight.getTime();

            let todaysClasses = Object.keys(todaysClassesRaw).map(timeKey => {
                const classData = todaysClassesRaw[timeKey];
                const startMins = timeStringToMinutes(timeKey);
                
                let duration = CLASS_DURATION_MINUTES;
                if(classData.type === 'Lab') duration = LAB_DURATION_MINUTES;
                if(classData.course === 'Consultation Hour') duration = CLASS_DURATION_MINUTES;
                
                const endMins = startMins + duration;
                
                return {
                    id: timeKey,
                    startTimeStr: formatTimeStr(timeKey),
                    endTimeStr: minutesToTimeStr(endMins),
                    startMins: startMins,
                    endMins: endMins,
                    ...classData
                };
            }).sort((a, b) => a.startMins - b.startMins);

            let ongoingClass = null;
            let upcomingClasses = [];
            let endedClasses = [];

            todaysClasses.forEach(cls => {
                if (isPast) {
                    cls.renderStatus = 'ended';
                    endedClasses.push(cls);
                } else if (!isToday) {
                    cls.renderStatus = 'upcoming';
                    upcomingClasses.push(cls);
                } else {
                    if (currentMinutes >= cls.startMins && currentMinutes < cls.endMins) {
                        cls.renderStatus = 'ongoing';
                        ongoingClass = cls;
                    } else if (currentMinutes < cls.startMins) {
                        cls.renderStatus = (cls.startMins - currentMinutes <= 10) ? 'upcoming-soon' : 'upcoming';
                        upcomingClasses.push(cls);
                    } else {
                        cls.renderStatus = 'ended';
                        endedClasses.push(cls);
                    }
                }
            });

            renderRoutine(ongoingClass, upcomingClasses, endedClasses, todaysClasses.length === 0, isToday);
        }

        // --- FREE SCHEDULE LOGIC ---
        function calculateFreeSchedule() {
            if (!globalData) return {};
            const users = Object.keys(globalData);
            const START_DAY = 8 * 60; // 08:00
            const END_DAY = 18 * 60;  // 18:00
            const freeTimes = {};

            workingDays.forEach(day => {
                let minuteMap = new Array(END_DAY - START_DAY).fill(false);
                
                users.forEach(user => {
                    const dayData = globalData[user][day] || {};
                    Object.keys(dayData).forEach(timeKey => {
                        const classData = dayData[timeKey];
                        const startMins = timeStringToMinutes(timeKey);
                        let duration = classData.type === 'Lab' ? LAB_DURATION_MINUTES : CLASS_DURATION_MINUTES;
                        const endMins = startMins + duration;
                        
                        const effectiveStart = Math.max(startMins, START_DAY);
                        const effectiveEnd = Math.min(endMins, END_DAY);
                        
                        for (let m = effectiveStart; m < effectiveEnd; m++) {
                            minuteMap[m - START_DAY] = true;
                        }
                    });
                });

                let blocks = [];
                let currentBlockStart = -1;
                
                for (let i = 0; i <= minuteMap.length; i++) {
                    const isBusy = (i === minuteMap.length) ? true : minuteMap[i]; 
                    
                    if (!isBusy && currentBlockStart === -1) {
                        currentBlockStart = i;
                    } else if (isBusy && currentBlockStart !== -1) {
                        const freeStartMins = currentBlockStart + START_DAY;
                        const freeEndMins = i + START_DAY;
                        
                        if ((freeEndMins - freeStartMins) >= 30) {
                            blocks.push({
                                startStr: minutesToTimeStr(freeStartMins),
                                endStr: minutesToTimeStr(freeEndMins)
                            });
                        }
                        currentBlockStart = -1;
                    }
                }
                freeTimes[day] = blocks;
            });
            return freeTimes;
        }

        function renderFreeScheduleTable() {
            const freeData = calculateFreeSchedule();
            const container = document.getElementById('free-schedule-table-container');
            
            let html = `
                <div class="overflow-hidden border border-slate-200 dark:border-slate-700/50 rounded-2xl bg-white dark:bg-slate-800/30 shadow-sm">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 dark:bg-slate-800/80 border-b border-slate-200 dark:border-slate-700/80">
                                <th class="py-4 px-5 font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-xs w-1/3">Day</th>
                                <th class="py-4 px-5 font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-xs">Available Slots</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 dark:divide-slate-800/50">
            `;
            
            workingDays.forEach(day => {
                const slots = freeData[day];
                const dayStr = day.charAt(0).toUpperCase() + day.slice(1);
                
                let slotsHtml = '';
                if (slots && slots.length > 0) {
                    slotsHtml = slots.map(slot => `
                        <span class="inline-block bg-green-50 text-green-700 dark:bg-green-500/10 dark:text-green-400 font-mono text-sm font-medium px-3 py-1.5 rounded-lg border border-green-200/50 dark:border-green-500/20 mr-2 mb-2 shadow-sm">
                            ${slot.startStr} - ${slot.endStr}
                        </span>
                    `).join('');
                } else {
                    slotsHtml = `<span class="text-slate-400 dark:text-slate-500 italic text-sm font-medium">No common free time</span>`;
                }

                html += `
                    <tr class="hover:bg-slate-50/50 dark:hover:bg-slate-800/40 transition-colors">
                        <td class="py-5 px-5 font-medium text-slate-700 dark:text-slate-300 align-top">${dayStr}</td>
                        <td class="py-5 px-5 align-top">
                            <div class="flex flex-wrap -mb-2">
                                ${slotsHtml}
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        // --- UI RENDERING (Cards) ---
        function createClassCard(cls, status) {
            let borderClass, bgClass, textClass, icon, statusText, roomBgClass, roomTextClass, titleClass;

            if (status === 'ongoing') {
                borderClass = 'ring-2 ring-green-500 dark:ring-green-400 shadow-green-500/20 dark:shadow-green-900/40 shadow-xl';
                bgClass = 'bg-white dark:bg-slate-800 border-transparent';
                textClass = 'text-green-600 dark:text-green-400';
                roomBgClass = 'bg-green-50 dark:bg-green-500/10';
                roomTextClass = 'text-green-700 dark:text-green-400';
                titleClass = 'text-slate-900 dark:text-white';
                icon = '<i class="ph ph-spinner-gap animate-spin text-lg"></i>';
                statusText = 'Happening Now';
            } else if (status === 'upcoming-soon') {
                borderClass = 'ring-2 ring-orange-400 dark:ring-orange-500 shadow-orange-500/20 dark:shadow-orange-900/40 shadow-xl';
                bgClass = 'bg-white dark:bg-slate-800 border-transparent';
                textClass = 'text-orange-600 dark:text-orange-400';
                roomBgClass = 'bg-orange-50 dark:bg-orange-500/10';
                roomTextClass = 'text-orange-700 dark:text-orange-400';
                titleClass = 'text-slate-900 dark:text-white';
                icon = '<i class="ph ph-warning-circle animate-pulse-soft text-lg"></i>';
                statusText = 'Starting Soon';
            } else if (status === 'upcoming') {
                borderClass = 'border border-slate-200 dark:border-slate-700 shadow-sm hover:border-slate-300 dark:hover:border-slate-600';
                bgClass = 'bg-white dark:bg-slate-800/80';
                textClass = 'text-blue-600 dark:text-blue-400';
                roomBgClass = 'bg-slate-50 dark:bg-slate-900/50';
                roomTextClass = 'text-slate-700 dark:text-slate-200';
                titleClass = 'text-slate-800 dark:text-slate-100';
                icon = '<i class="ph ph-clock text-lg"></i>';
                statusText = 'Upcoming';
            } else {
                borderClass = 'border border-slate-200 dark:border-slate-800 opacity-60';
                bgClass = 'bg-slate-50 dark:bg-slate-900/30';
                textClass = 'text-slate-500 dark:text-slate-500';
                roomBgClass = 'bg-slate-100/50 dark:bg-slate-950/50';
                roomTextClass = 'text-slate-400 dark:text-slate-600';
                titleClass = 'text-slate-500 dark:text-slate-400';
                icon = '<i class="ph ph-check-circle text-lg"></i>';
                statusText = 'Ended';
            }

            const classType = cls.type || 'Theory';
            const roomDisplay = cls.room || 'TBA';
            const instructorDisplay = cls.instructor || 'Not Assigned';

            return `
                <div class="${bgClass} ${borderClass} rounded-2xl flex overflow-hidden transition-all duration-300 hover:-translate-y-1">
                    <!-- Left Column: Room -->
                    <div class="w-1/3 sm:w-1/4 ${roomBgClass} flex flex-col items-center justify-center p-4 border-r border-slate-100 dark:border-slate-700/50 min-h-[120px]">
                        <span class="text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500 font-bold mb-1.5 text-center">Room</span>
                        <span class="text-2xl sm:text-3xl font-black ${roomTextClass} text-center leading-none break-all tracking-tight">${roomDisplay}</span>
                    </div>
                    
                    <!-- Right Column: Details -->
                    <div class="w-2/3 sm:w-3/4 p-5 sm:p-6 flex flex-col justify-center">
                        <div class="flex justify-between items-start mb-3 gap-2 flex-wrap">
                            <div class="flex items-center space-x-1.5 ${textClass} font-bold text-xs uppercase tracking-wider">
                                ${icon} <span>${statusText}</span>
                            </div>
                            <div class="text-[11px] font-mono font-medium bg-slate-100 dark:bg-slate-900 px-2.5 py-1 rounded-md text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-700/50 whitespace-nowrap shadow-sm">
                                ${cls.startTimeStr} - ${cls.endTimeStr}
                            </div>
                        </div>
                        
                        <div>
                            <div class="flex items-center space-x-3 mb-2 flex-wrap gap-y-1">
                                <h3 class="text-xl sm:text-2xl font-bold ${titleClass} leading-tight">${cls.course}</h3>
                                <span class="text-[10px] font-bold px-2 py-0.5 rounded-md ${classType === 'Lab' ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-500/20 dark:text-indigo-300' : 'bg-slate-200 text-slate-600 dark:bg-slate-700 dark:text-slate-300'} uppercase tracking-wider">${classType}</span>
                            </div>
                            
                            <div class="flex items-center text-slate-500 dark:text-slate-400 text-sm">
                                <i class="ph ph-user-circle mr-1.5 text-lg opacity-70"></i>
                                <span class="font-medium truncate">${instructorDisplay}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderRoutine(ongoing, upcoming, ended, isFreeDay, isToday) {
            const container = document.getElementById('routine-container');
            let html = '';

            if (isFreeDay) {
                html = `
                    <div class="text-center py-20 animate-fade-in bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 rounded-[2rem] p-8 shadow-sm">
                        <div class="w-20 h-20 bg-slate-50 dark:bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i class="ph ph-coffee text-4xl text-slate-400 dark:text-slate-500"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-700 dark:text-slate-200">No classes scheduled!</h2>
                        <p class="text-slate-500 dark:text-slate-400 mt-2 font-medium">Enjoy your free time.</p>
                    </div>
                `;
            } else {
                if (ongoing) {
                    html += `
                        <div class="animate-fade-in mb-8">
                            <h2 class="text-[11px] uppercase tracking-widest text-slate-400 dark:text-slate-500 font-bold mb-4 pl-2 flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                Current Class
                            </h2>
                            ${createClassCard(ongoing, ongoing.renderStatus)}
                        </div>
                    `;
                }

                if (upcoming.length > 0) {
                    const headerText = isToday ? "Next Up" : "Scheduled Classes";
                    html += `
                        <div class="animate-fade-in mb-8" style="animation-delay: 0.1s">
                            <h2 class="text-[11px] uppercase tracking-widest text-slate-400 dark:text-slate-500 font-bold mb-4 pl-2">${headerText}</h2>
                            <div class="space-y-4">
                                ${upcoming.map(cls => createClassCard(cls, cls.renderStatus)).join('')}
                            </div>
                        </div>
                    `;
                }

                if (ended.length > 0) {
                    const headerText = isToday ? "Completed Today" : "Completed";
                    html += `
                        <div class="animate-fade-in" style="animation-delay: 0.2s">
                            <h2 class="text-[11px] uppercase tracking-widest text-slate-400 dark:text-slate-500 font-bold mb-4 pl-2">${headerText}</h2>
                            <div class="space-y-4">
                                ${ended.map(cls => createClassCard(cls, cls.renderStatus)).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            if (container.innerHTML !== html) {
                container.innerHTML = html;
            }
        }

        // --- EVENT LISTENERS ---

        // Theme Toggle
        const themeBtn = document.getElementById('theme-btn');
        const themeIconDark = document.getElementById('theme-icon');
        const themeIconLight = document.getElementById('theme-icon-light');
        const htmlElement = document.documentElement;

        themeBtn.addEventListener('click', () => {
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark');
                localStorage.theme = 'light';
                themeIconDark.classList.add('hidden');
                themeIconLight.classList.remove('hidden');
                themeIconLight.classList.add('block');
            } else {
                htmlElement.classList.add('dark');
                localStorage.theme = 'dark';
                themeIconLight.classList.add('hidden');
                themeIconLight.classList.remove('block');
                themeIconDark.classList.remove('hidden');
            }
        });

        // Date Selectors
        document.getElementById('date-selector').addEventListener('click', () => {
            const picker = document.getElementById('date-picker');
            try { picker.showPicker(); } catch (e) { picker.focus(); }
        });

        document.getElementById('date-picker').addEventListener('change', (e) => {
            if (e.target.value) {
                const [year, month, day] = e.target.value.split('-');
                manualDate = new Date(year, month - 1, day);
            } else {
                manualDate = null;
            }
            updateApp();
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            manualDate = null;
            updateApp();
        });
        
        // User Selector
        document.getElementById('user-selector').addEventListener('change', (e) => {
            currentUser = e.target.value;
            localStorage.setItem('selectedUser', currentUser);
            manualDate = null; 
            updateApp();
        });

        // Modal Logic
        const modalOverlay = document.getElementById('free-modal-overlay');
        const modalContent = document.getElementById('free-modal-content');
        const openModalBtn = document.getElementById('free-schedule-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');

        function openModal() {
            renderFreeScheduleTable();
            modalOverlay.classList.remove('hidden');
            
            // Trigger animation frame for CSS transition
            requestAnimationFrame(() => {
                modalOverlay.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            });
        }

        function closeModal() {
            modalOverlay.classList.add('opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modalOverlay.classList.add('hidden');
            }, 300);
        }

        openModalBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // --- INITIALIZATION ---
        function populateUserDropdown() {
            if(!globalData) return;
            const selector = document.getElementById('user-selector');
            selector.innerHTML = '';
            
            const users = Object.keys(globalData);
            const savedUser = localStorage.getItem('selectedUser');
            
            users.forEach(user => {
                const option = document.createElement('option');
                option.value = user;
                option.textContent = user;
                selector.appendChild(option);
            });
            
            if(savedUser && users.includes(savedUser)) {
                currentUser = savedUser;
            } else if (users.length > 0) {
                currentUser = users[0];
            }
            selector.value = currentUser;
        }

        async function loadDataAndStart() {
            // Update clock immediately
            let hours = new Date().getHours();
            let minutes = new Date().getMinutes();
            document.getElementById('time-display').innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;

            try {
                // Fetch the routine.json (Cache-busting appended to bypass GitHub Pages aggressive caching)
                const cacheBuster = new Date().getTime();
                const response = await fetch(`routine.json?v=${cacheBuster}`);
                
                if (!response.ok) throw new Error(`Could not fetch routine.json (Status: ${response.status})`);
                
                globalData = await response.json();
                
                populateUserDropdown();
                updateApp();
                setInterval(updateApp, 10000);
                
            } catch (error) {
                console.error("Error loading JSON:", error);
                document.getElementById('routine-container').innerHTML = `
                    <div class="text-center py-12 animate-fade-in bg-white dark:bg-slate-800/50 border border-red-200 dark:border-red-900/30 rounded-[2rem] p-8 shadow-sm">
                        <div class="w-16 h-16 bg-red-50 dark:bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="ph ph-warning-circle text-3xl text-red-500"></i>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 mb-2">Failed to load routine</h2>
                        <p class="text-slate-500 dark:text-slate-400 text-sm">Please ensure <code class="bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded text-red-500">routine.json</code> is uploaded.</p>
                        <p class="text-xs text-slate-400 mt-4 opacity-70 border-t border-slate-100 dark:border-slate-700/50 pt-4">${error.message}</p>
                    </div>`;
            }
        }

        loadDataAndStart();

    </script>
</body>
</html>
