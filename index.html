<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Class Routine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        // Set dark mode instantly on load to prevent screen flash
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        
        /* Modal transitions */
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: opacity 300ms, transform 300ms; }
        .modal-exit { opacity: 1; transform: scale(1); }
        .modal-exit-active { opacity: 0; transform: scale(0.95); transition: opacity 300ms, transform 300ms; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans antialiased min-h-screen pb-12 selection:bg-blue-500 selection:text-white transition-colors duration-300">

    <div class="max-w-6xl mx-auto p-5 md:p-8">
        
        <!-- Navigation & Controls Bar -->
        <div class="flex justify-between items-center mb-6 md:mb-10 animate-fade-in relative z-40 gap-4 flex-wrap">
            
            <!-- User Selector Dropdown -->
            <div class="relative">
                <select id="user-selector" class="appearance-none bg-white dark:bg-[#252525] border border-gray-200 dark:border-[#333] text-gray-800 dark:text-gray-200 text-sm sm:text-base font-semibold rounded-2xl pl-4 pr-10 py-3 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 cursor-pointer transition-colors min-w-[140px]">
                    <option value="" disabled selected>Loading...</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                    <i class="ph ph-caret-down font-bold"></i>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <!-- Free Schedule Button -->
                <button id="free-schedule-btn" class="flex items-center gap-2 px-4 py-3 rounded-2xl bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-500/30 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 font-semibold text-sm sm:text-base transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50">
                    <i class="ph ph-users-three text-lg"></i>
                    <span>Free Schedule</span>
                </button>

                <!-- Theme Toggle Button -->
                <button id="theme-btn" class="p-3 rounded-2xl bg-white dark:bg-[#252525] border border-gray-200 dark:border-[#333] shadow-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-[#333] transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                    <i id="theme-icon" class="ph ph-moon text-2xl hidden dark:block text-yellow-400"></i>
                    <i id="theme-icon-light" class="ph ph-sun text-2xl block dark:hidden text-indigo-500"></i>
                </button>
            </div>
        </div>

        <!-- Main Responsive Layout Wrapper -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-10 items-start">
            
            <!-- Left Panel: Clock & Date Selection (Sticky on Desktop) -->
            <header class="md:sticky md:top-8 text-center animate-fade-in bg-white dark:bg-slate-900/50 rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200 dark:border-slate-800">
                <h1 id="time-display" class="text-6xl md:text-7xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 drop-shadow-sm transition-all duration-200">
                    00:00
                </h1>
                
                <!-- Date & Date Picker Section -->
                <div class="mt-6 flex flex-col items-center justify-center space-y-3">
                    <div id="date-selector" class="flex items-center justify-center space-x-2 text-slate-700 dark:text-slate-300 relative group cursor-pointer bg-slate-100 dark:bg-slate-900/60 hover:bg-slate-200 dark:hover:bg-slate-800 px-5 py-3 rounded-2xl transition-all border border-slate-200 dark:border-slate-800 shadow-sm active:scale-95">
                        <i class="ph ph-calendar-blank text-xl"></i>
                        <p id="date-display" class="text-base md:text-lg font-semibold"></p>
                        <i class="ph ph-caret-down text-sm text-slate-500 ml-1"></i>
                        <!-- Hidden native date picker -->
                        <input type="date" id="date-picker" class="absolute w-0 h-0 opacity-0 overflow-hidden" style="bottom: 0; left: 50%;">
                    </div>
                    
                    <button id="reset-btn" class="hidden text-xs bg-blue-100 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400 hover:bg-blue-200 dark:hover:bg-blue-500/20 border border-blue-300 dark:border-blue-500/30 px-4 py-2 rounded-full transition-colors items-center space-x-1.5 shadow-sm">
                        <i class="ph ph-arrow-u-down-left font-bold"></i>
                        <span class="font-semibold tracking-wide">Back to Today</span>
                    </button>
                </div>
            </header>

            <!-- Right Panel: Dynamic Schedule Container -->
            <main id="routine-container" class="md:col-span-2 space-y-8">
                <!-- Dynamic content will be injected here by JS -->
            </main>

        </div>
    </div>

    <!-- Free Schedule Modal Overlay -->
    <div id="free-modal-overlay" class="fixed inset-0 bg-slate-900/60 dark:bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <!-- Modal Content -->
        <div id="free-modal-content" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col transform transition-all duration-300 scale-95 opacity-0">
            
            <div class="flex justify-between items-center p-6 border-b border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-100 dark:bg-indigo-500/20 p-2 rounded-xl text-indigo-600 dark:text-indigo-400">
                        <i class="ph ph-users-three text-2xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 dark:text-slate-100">Common Free Times</h2>
                </div>
                <button id="close-modal-btn" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:outline-none">
                    <i class="ph ph-x text-2xl font-bold"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto custom-scrollbar">
                <p class="text-slate-500 dark:text-slate-400 mb-6">Times when <span class="font-semibold text-slate-700 dark:text-slate-200">everyone</span> is free between 08:00 and 18:00.</p>
                <div id="free-schedule-table-container">
                    <!-- Table injected by JS -->
                </div>
            </div>
            
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CLASS_DURATION_MINUTES = 50; 
        const LAB_DURATION_MINUTES = 150; 

        let globalData = null; // Holds the entire routines.json object
        let currentUser = null; // Currently selected user key

        const daysOfWeek = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
        const workingDays = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday'];
        
        let manualDate = null;

        // --- HELPER FUNCTIONS ---
        function timeStringToMinutes(timeStr) {
            const hours = parseInt(timeStr.substring(0, 2), 10);
            const mins = parseInt(timeStr.substring(2, 4), 10);
            return (hours * 60) + mins;
        }

        function formatTimeStr(timeStr) {
            let hours = timeStr.substring(0, 2);
            let mins = timeStr.substring(2, 4);
            return `${hours}:${mins}`;
        }
        
        function minutesToTimeStr(minsTotal) {
            const h = Math.floor(minsTotal / 60);
            const m = minsTotal % 60;
            return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
        }

        function getMinutesFromMidnight(date) {
            return (date.getHours() * 60) + date.getMinutes();
        }

        // --- MAIN APP LOGIC ---

        function updateApp() {
            if (!globalData || !currentUser) return; 
            
            const routineData = globalData[currentUser];
            if(!routineData) return;

            const realNow = new Date();
            const targetDate = manualDate || realNow;
            
            // 1. Update Clock Display (Real time)
            let hours = realNow.getHours();
            let minutes = realNow.getMinutes();
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('time-display').innerText = `${hours}:${minutes}`;

            // 2. Update Date Display
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date-display').innerText = targetDate.toLocaleDateString('en-US', options);

            const resetBtn = document.getElementById('reset-btn');
            const datePicker = document.getElementById('date-picker');
            
            if (manualDate) {
                resetBtn.classList.remove('hidden');
                resetBtn.classList.add('flex');
            } else {
                resetBtn.classList.add('hidden');
                resetBtn.classList.remove('flex');
                datePicker.value = ''; 
            }

            // 3. Process Routine Data for Current User
            const currentDayName = daysOfWeek[targetDate.getDay()];
            const todaysClassesRaw = routineData[currentDayName] || {};
            const currentMinutes = getMinutesFromMidnight(realNow);

            const todayMidnight = new Date(realNow.getFullYear(), realNow.getMonth(), realNow.getDate());
            const targetMidnight = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
            
            const isToday = targetMidnight.getTime() === todayMidnight.getTime();
            const isPast = targetMidnight.getTime() < todayMidnight.getTime();

            let todaysClasses = Object.keys(todaysClassesRaw).map(timeKey => {
                const classData = todaysClassesRaw[timeKey];
                const startMins = timeStringToMinutes(timeKey);
                
                let duration = CLASS_DURATION_MINUTES;
                if(classData.type === 'Lab') duration = LAB_DURATION_MINUTES;
                // Specific handling for Consultation Hour to default to 50 mins if not specified otherwise
                if(classData.course === 'Consultation Hour') duration = CLASS_DURATION_MINUTES;
                
                const endMins = startMins + duration;
                
                return {
                    id: timeKey,
                    startTimeStr: formatTimeStr(timeKey),
                    endTimeStr: formatTimeStr(
                        String(Math.floor(endMins / 60)).padStart(2, '0') + 
                        String(endMins % 60).padStart(2, '0')
                    ),
                    startMins: startMins,
                    endMins: endMins,
                    ...classData
                };
            }).sort((a, b) => a.startMins - b.startMins);

            let ongoingClass = null;
            let upcomingClasses = [];
            let endedClasses = [];

            todaysClasses.forEach(cls => {
                if (isPast) {
                    cls.renderStatus = 'ended';
                    endedClasses.push(cls);
                } else if (!isToday) {
                    cls.renderStatus = 'upcoming';
                    upcomingClasses.push(cls);
                } else {
                    if (currentMinutes >= cls.startMins && currentMinutes < cls.endMins) {
                        cls.renderStatus = 'ongoing';
                        ongoingClass = cls;
                    } else if (currentMinutes < cls.startMins) {
                        cls.renderStatus = (cls.startMins - currentMinutes <= 10) ? 'upcoming-soon' : 'upcoming';
                        upcomingClasses.push(cls);
                    } else {
                        cls.renderStatus = 'ended';
                        endedClasses.push(cls);
                    }
                }
            });

            renderRoutine(ongoingClass, upcomingClasses, endedClasses, todaysClasses.length === 0, isToday);
        }

        // --- FREE SCHEDULE LOGIC ---
        function calculateFreeSchedule() {
            if (!globalData) return {};
            
            const users = Object.keys(globalData);
            const START_DAY = 8 * 60; // 08:00
            const END_DAY = 18 * 60;  // 18:00
            
            const freeTimes = {};

            workingDays.forEach(day => {
                // Initialize boolean array for the day: true = busy, false = free
                // Array length covers minutes from 8am to 6pm (10 hours * 60 mins = 600 slots)
                // We use offset logic: index 0 is 08:00.
                let minuteMap = new Array(END_DAY - START_DAY).fill(false);
                
                // Mark busy times for all users
                users.forEach(user => {
                    const dayData = globalData[user][day] || {};
                    Object.keys(dayData).forEach(timeKey => {
                        const classData = dayData[timeKey];
                        const startMins = timeStringToMinutes(timeKey);
                        let duration = classData.type === 'Lab' ? LAB_DURATION_MINUTES : CLASS_DURATION_MINUTES;
                        const endMins = startMins + duration;
                        
                        // Bound to 08:00 - 18:00 window
                        const effectiveStart = Math.max(startMins, START_DAY);
                        const effectiveEnd = Math.min(endMins, END_DAY);
                        
                        for (let m = effectiveStart; m < effectiveEnd; m++) {
                            minuteMap[m - START_DAY] = true;
                        }
                    });
                });

                // Find continuous blocks of false (free time)
                let blocks = [];
                let currentBlockStart = -1;
                
                for (let i = 0; i <= minuteMap.length; i++) {
                    const isBusy = (i === minuteMap.length) ? true : minuteMap[i]; // Force end at 18:00
                    
                    if (!isBusy && currentBlockStart === -1) {
                        // Start of free block
                        currentBlockStart = i;
                    } else if (isBusy && currentBlockStart !== -1) {
                        // End of free block
                        const freeStartMins = currentBlockStart + START_DAY;
                        const freeEndMins = i + START_DAY;
                        
                        // Only add if free block is at least 30 mins
                        if ((freeEndMins - freeStartMins) >= 30) {
                            blocks.push({
                                startStr: minutesToTimeStr(freeStartMins),
                                endStr: minutesToTimeStr(freeEndMins)
                            });
                        }
                        currentBlockStart = -1;
                    }
                }
                
                freeTimes[day] = blocks;
            });
            
            return freeTimes;
        }

        function renderFreeScheduleTable() {
            const freeData = calculateFreeSchedule();
            const container = document.getElementById('free-schedule-table-container');
            
            let html = `
                <div class="overflow-hidden border border-slate-200 dark:border-slate-700 rounded-2xl bg-white dark:bg-slate-800/50 shadow-sm">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 dark:bg-slate-800/80 border-b border-slate-200 dark:border-slate-700">
                                <th class="py-3 px-4 sm:px-6 font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider text-xs w-1/3">Day</th>
                                <th class="py-3 px-4 sm:px-6 font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider text-xs">Common Free Time Slots</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 dark:divide-slate-700/50">
            `;
            
            workingDays.forEach(day => {
                const slots = freeData[day];
                const dayStr = day.charAt(0).toUpperCase() + day.slice(1);
                
                let slotsHtml = '';
                if (slots && slots.length > 0) {
                    slotsHtml = slots.map(slot => `
                        <span class="inline-block bg-green-100 text-green-700 dark:bg-green-500/20 dark:text-green-400 font-mono text-sm px-2.5 py-1 rounded-md border border-green-200 dark:border-green-500/30 mr-2 mb-2">
                            ${slot.startStr} - ${slot.endStr}
                        </span>
                    `).join('');
                } else {
                    slotsHtml = `<span class="text-slate-400 dark:text-slate-500 italic text-sm">No common free time</span>`;
                }

                html += `
                    <tr class="hover:bg-slate-50/50 dark:hover:bg-slate-800/30 transition-colors">
                        <td class="py-4 px-4 sm:px-6 font-medium text-slate-800 dark:text-slate-200 align-top">${dayStr}</td>
                        <td class="py-4 px-4 sm:px-6 align-top">
                            <div class="flex flex-wrap -mb-2">
                                ${slotsHtml}
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                        </tbody>
                    </table>
                </div>
            `;
            
            container.innerHTML = html;
        }

        // --- UI RENDERING (Cards) ---

        function createClassCard(cls, status) {
            let borderClass, bgClass, textClass, icon, statusText, roomBgClass, roomTextClass;

            if (status === 'ongoing') {
                borderClass = 'border-l-4 border-green-500 shadow-green-900/10 dark:shadow-green-950/20 shadow-lg';
                bgClass = 'bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800';
                textClass = 'text-green-600 dark:text-green-400';
                roomBgClass = 'bg-green-500/10 dark:bg-green-500/20';
                roomTextClass = 'text-green-700 dark:text-green-400';
                icon = '<i class="ph ph-spinner-gap animate-spin text-xl"></i>';
                statusText = 'Happening Now';
            } else if (status === 'upcoming-soon') {
                borderClass = 'border-l-4 border-orange-500 shadow-orange-900/10 dark:shadow-orange-950/20 shadow-lg';
                bgClass = 'bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800';
                textClass = 'text-orange-600 dark:text-orange-400';
                roomBgClass = 'bg-orange-500/10 dark:bg-orange-500/20';
                roomTextClass = 'text-orange-700 dark:text-orange-400';
                icon = '<i class="ph ph-warning-circle animate-pulse text-xl"></i>';
                statusText = 'Starting Soon';
            } else if (status === 'upcoming') {
                borderClass = 'border-l-4 border-slate-400 dark:border-slate-700 shadow-sm';
                bgClass = 'bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800';
                textClass = 'text-slate-600 dark:text-slate-300';
                roomBgClass = 'bg-slate-100 dark:bg-slate-950';
                roomTextClass = 'text-slate-800 dark:text-slate-100';
                icon = '<i class="ph ph-clock text-xl"></i>';
                statusText = 'Upcoming';
            } else {
                borderClass = 'border-l-4 border-slate-300 dark:border-slate-800 opacity-60 grayscale-[40%]';
                bgClass = 'bg-slate-100/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800/60';
                textClass = 'text-slate-500 dark:text-slate-500';
                roomBgClass = 'bg-slate-200/50 dark:bg-slate-950/40';
                roomTextClass = 'text-slate-500 dark:text-slate-500';
                icon = '<i class="ph ph-check-circle text-xl"></i>';
                statusText = 'Ended';
            }

            const classType = cls.type || 'Theory';
            const roomDisplay = cls.room || 'TBA';
            const instructorDisplay = cls.instructor || 'Not Assigned';

            return `
                <div class="${bgClass} ${borderClass} rounded-r-2xl flex overflow-hidden transition-all duration-300 hover:scale-[1.01] hover:shadow-md">
                    <!-- Left Column: Room -->
                    <div class="w-1/3 ${roomBgClass} flex flex-col items-center justify-center p-3 border-r border-slate-200 dark:border-slate-800/50 min-h-[110px]">
                        <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1 text-center">Room</span>
                        <span class="text-2xl md:text-3xl font-black ${roomTextClass} text-center leading-none break-all px-1">${roomDisplay}</span>
                    </div>
                    
                    <!-- Right Column: Details -->
                    <div class="w-2/3 p-4 flex flex-col justify-between">
                        <div class="flex justify-between items-start mb-3 gap-2 flex-wrap">
                            <div class="flex items-center space-x-1.5 ${textClass} font-semibold text-xs tracking-wide">
                                ${icon} <span>${statusText}</span>
                            </div>
                            <div class="text-[10px] font-mono bg-slate-100 dark:bg-slate-950 px-2 py-1 rounded text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-800 whitespace-nowrap">
                                ${cls.startTimeStr} - ${cls.endTimeStr}
                            </div>
                        </div>
                        
                        <div>
                            <div class="flex items-center space-x-2 mb-1.5 flex-wrap gap-y-1">
                                <h3 class="text-xl md:text-2xl font-bold text-slate-800 dark:text-slate-100 leading-tight">${cls.course}</h3>
                                <span class="text-[9px] font-bold px-1.5 py-0.5 rounded-sm ${classType === 'Lab' ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-500/20 dark:text-indigo-300' : 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400'} uppercase tracking-wider">${classType}</span>
                            </div>
                            
                            <div class="flex items-center text-slate-500 dark:text-slate-400 text-sm mt-1">
                                <i class="ph ph-user-circle mr-1.5 text-lg flex-shrink-0"></i>
                                <span class="text-slate-700 dark:text-slate-300 font-medium truncate">${instructorDisplay}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderRoutine(ongoing, upcoming, ended, isFreeDay, isToday) {
            const container = document.getElementById('routine-container');
            let html = '';

            if (isFreeDay) {
                html = `
                    <div class="text-center py-16 animate-fade-in bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-8">
                        <i class="ph ph-coffee text-6xl text-slate-400 dark:text-slate-600 mb-4 block"></i>
                        <h2 class="text-2xl font-bold text-slate-700 dark:text-slate-300">No classes scheduled!</h2>
                        <p class="text-slate-500 mt-2">Enjoy your free time.</p>
                    </div>
                `;
            } else {
                if (ongoing) {
                    html += `
                        <div class="animate-fade-in">
                            <h2 class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-3 pl-1">Current</h2>
                            ${createClassCard(ongoing, ongoing.renderStatus)}
                        </div>
                    `;
                }

                if (upcoming.length > 0) {
                    const headerText = isToday ? "Next Up" : "Scheduled";
                    html += `
                        <div class="animate-fade-in" style="animation-delay: 0.1s">
                            <h2 class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-3 pl-1 mt-6">${headerText}</h2>
                            <div class="space-y-4">
                                ${upcoming.map(cls => createClassCard(cls, cls.renderStatus)).join('')}
                            </div>
                        </div>
                    `;
                }

                if (ended.length > 0) {
                    const headerText = isToday ? "Completed Today" : "Completed";
                    html += `
                        <div class="animate-fade-in" style="animation-delay: 0.2s">
                            <h2 class="text-xs uppercase tracking-widest text-slate-500 dark:text-slate-600 font-bold mb-3 pl-1 mt-6">${headerText}</h2>
                            <div class="space-y-4">
                                ${ended.map(cls => createClassCard(cls, cls.renderStatus)).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            if (container.innerHTML !== html) {
                container.innerHTML = html;
            }
        }

        // --- EVENT LISTENERS ---

        // Theme Toggle
        const themeBtn = document.getElementById('theme-btn');
        const themeIconDark = document.getElementById('theme-icon');
        const themeIconLight = document.getElementById('theme-icon-light');
        const htmlElement = document.documentElement;

        themeBtn.addEventListener('click', () => {
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark');
                localStorage.theme = 'light';
                themeIconDark.classList.add('hidden');
                themeIconLight.classList.remove('hidden');
                themeIconLight.classList.add('block');
            } else {
                htmlElement.classList.add('dark');
                localStorage.theme = 'dark';
                themeIconLight.classList.add('hidden');
                themeIconLight.classList.remove('block');
                themeIconDark.classList.remove('hidden');
            }
        });

        // Date Selectors
        document.getElementById('date-selector').addEventListener('click', () => {
            const picker = document.getElementById('date-picker');
            try { picker.showPicker(); } catch (e) { picker.focus(); }
        });

        document.getElementById('date-picker').addEventListener('change', (e) => {
            if (e.target.value) {
                const [year, month, day] = e.target.value.split('-');
                manualDate = new Date(year, month - 1, day);
            } else {
                manualDate = null;
            }
            updateApp();
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            manualDate = null;
            updateApp();
        });
        
        // User Selector
        document.getElementById('user-selector').addEventListener('change', (e) => {
            currentUser = e.target.value;
            // Save preference to local storage
            localStorage.setItem('selectedUser', currentUser);
            // Reset to today when changing user
            manualDate = null; 
            updateApp();
        });

        // Modal Logic
        const modalOverlay = document.getElementById('free-modal-overlay');
        const modalContent = document.getElementById('free-modal-content');
        const openModalBtn = document.getElementById('free-schedule-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');

        function openModal() {
            renderFreeScheduleTable();
            modalOverlay.classList.remove('hidden');
            
            // Trigger animation frame for CSS transition
            requestAnimationFrame(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            });
        }

        function closeModal() {
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            
            // Wait for transition to finish before hiding
            setTimeout(() => {
                modalOverlay.classList.add('hidden');
            }, 300);
        }

        openModalBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // --- INITIALIZATION ---
        
        function populateUserDropdown() {
            if(!globalData) return;
            const selector = document.getElementById('user-selector');
            selector.innerHTML = '';
            
            const users = Object.keys(globalData);
            
            // Check if there is a saved preference
            const savedUser = localStorage.getItem('selectedUser');
            
            users.forEach(user => {
                const option = document.createElement('option');
                option.value = user;
                option.textContent = user;
                selector.appendChild(option);
            });
            
            // Set current user
            if(savedUser && users.includes(savedUser)) {
                currentUser = savedUser;
            } else if (users.length > 0) {
                currentUser = users[0];
            }
            
            selector.value = currentUser;
        }

        async function loadDataAndStart() {
            try {
                // Fallback prevents CORS errors locally
                const protocol = window.location.protocol;
                if (protocol === 'blob:' || protocol === 'data:' || protocol === 'file:') {
                    console.log("Running locally. Using fetch but expecting failure if strict CORS.");
                }
                
                // Fetch the new routines.json
                const response = await fetch('routines.json');
                if (!response.ok) throw new Error('Could not fetch routines.json');
                globalData = await response.json();
                
                populateUserDropdown();
                updateApp();
                setInterval(updateApp, 10000);
                
            } catch (error) {
                console.error("Error loading JSON:", error);
                document.getElementById('routine-container').innerHTML = `
                    <div class="text-center py-10 animate-fade-in text-red-500 bg-red-50 dark:bg-red-900/10 border border-red-200 dark:border-red-900/30 rounded-2xl m-4">
                        <i class="ph ph-warning-circle text-4xl mb-2"></i>
                        <p class="font-medium">Failed to load routine data.</p>
                        <p class="text-sm mt-2 text-red-400">Make sure <span class="font-mono bg-red-100 dark:bg-red-900/50 px-1 rounded">routines.json</span> is uploaded.</p>
                    </div>`;
            }
        }

        loadDataAndStart();

    </script>
</body>
</html>
